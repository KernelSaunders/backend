name: CI

on:
  push:
  pull_request:

jobs:
  # One matrix job expands to many parallel runs; each has a clear name in the Actions UI.
  tests:
    name: "${{ matrix.group_label }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group_label: "Unit · Config"
            pytest_target: tests/test_config.py
          - group_label: "Unit · Database layer"
            pytest_target: tests/test_database.py
          - group_label: "Unit · Authentication"
            pytest_target: tests/test_auth.py
          - group_label: "Unit · Shared fixtures (conftest)"
            pytest_target: tests/test_conftest.py
          - group_label: "Models · Product, stage & input share"
            pytest_target: tests/models/test_product.py
          - group_label: "Models · Claim & evidence"
            pytest_target: tests/models/test_claim.py
          - group_label: "Models · Issue reports & changelog"
            pytest_target: tests/models/test_issue.py
          - group_label: "Models · User, role, progress & quest mission"
            pytest_target: tests/models/test_user.py
          - group_label: "API · Products router"
            pytest_target: tests/routers/test_products.py
          - group_label: "API · Missions router"
            pytest_target: tests/routers/test_missions.py
          - group_label: "API · Users router"
            pytest_target: tests/routers/test_users.py
          - group_label: "API · Issues router"
            pytest_target: tests/routers/test_issues.py

    env:
      CI: true
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: test-key-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: "Run ${{ matrix.group_label }}"
        run: pytest "${{ matrix.pytest_target }}" -v
